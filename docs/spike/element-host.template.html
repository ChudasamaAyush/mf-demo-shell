<!doctype html>
<!--
  Angular Elements spike host page (template).

  How to use:
    1. cd apps/reports-remote && pnpm build
    2. ls dist/reports-remote/browser/ — note the hashed filenames
    3. Replace POLYFILLS_HASH and MAIN_HASH below with the actual hashes
    4. Copy this file into apps/reports-remote/dist/reports-remote/browser/spike-host.html
    5. Serve that directory: `npx http-server apps/reports-remote/dist/reports-remote/browser -p 4000`
    6. Open http://localhost:4000/spike-host.html — you should see three stat cards
       and a green "element is registered" status.

  What this proves:
    A standalone Angular component, registered as a custom element via @angular/elements,
    can be consumed from a non-Angular environment (a plain HTML page, or — once MF
    wiring is added — a React host). No Angular CLI runtime is needed on the host side.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Angular Elements Spike Host (template)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      padding: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .note {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      color: #475569;
      font-size: 14px;
    }
    code { background: #eef2ff; padding: 1px 6px; border-radius: 4px; }
    .status { font-size: 13px; color: #64748b; margin: 8px 0 16px; }
    .status.ok { color: #10b981; }
    .status.err { color: #ef4444; }
  </style>
</head>
<body>
  <h1>Angular Elements interop spike</h1>
  <p class="note">
    Plain HTML, no Angular CLI runtime. Two <code>&lt;script&gt;</code> tags load the
    Angular Elements bundle; the <code>&lt;reports-dashboard&gt;</code> tag below is
    rendered by the registered custom element.
  </p>

  <div id="status" class="status">Loading bundle…</div>
  <reports-dashboard></reports-dashboard>

  <!-- Angular 17's application builder emits ES modules — type=module is required.
       Loading these as classic scripts breaks zone.js with
       "Class constructor cannot be invoked without 'new'". -->
  <script type="module" src="./polyfills-POLYFILLS_HASH.js"></script>
  <script type="module" src="./main-MAIN_HASH.js"></script>
  <script>
    (function checkRegistered() {
      var statusEl = document.getElementById('status');
      function tick(attempt) {
        if (customElements.get('reports-dashboard')) {
          statusEl.textContent = '✅ customElements.get("reports-dashboard") resolved — element is registered.';
          statusEl.className = 'status ok';
          return;
        }
        if (attempt > 50) {
          statusEl.textContent = '❌ reports-dashboard was not registered within 5s. Check the console.';
          statusEl.className = 'status err';
          return;
        }
        setTimeout(function () { tick(attempt + 1); }, 100);
      }
      tick(0);
    })();
  </script>
</body>
</html>
