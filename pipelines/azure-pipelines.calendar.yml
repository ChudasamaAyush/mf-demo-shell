# Builds and deploys apps/calendar-remote to its Azure Static Web App.
#
# Required pipeline variables:
#   CALENDAR_SWA_TOKEN              (secret) deployment token from the Azure portal
#   PUBLIC_CALENDAR_REMOTE_URL      (plain)  this SWA's own URL — baked into the
#                                            manifest's publicPath so chunks load
#                                            cross-origin without 404s

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - apps/calendar-remote/**
      - packages/contracts/**
      - packages/design-tokens/**
      - pipelines/azure-pipelines.calendar.yml
      - pnpm-lock.yaml
      - pnpm-workspace.yaml

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '22.x'
  PNPM_VERSION: '11.1.3'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: $(NODE_VERSION)
    displayName: Install Node

  - script: npm install -g pnpm@$(PNPM_VERSION)
    displayName: Install pnpm

  - script: pnpm install --frozen-lockfile
    displayName: Install workspace dependencies

  - script: pnpm --filter calendar-remote build
    displayName: Build calendar-remote
    env:
      PUBLIC_CALENDAR_REMOTE_URL: $(PUBLIC_CALENDAR_REMOTE_URL)

  - task: AzureStaticWebApp@0
    inputs:
      app_location: 'apps/calendar-remote/dist'
      skip_app_build: true
      skip_api_build: true
    env:
      azure_static_web_apps_api_token: $(CALENDAR_SWA_TOKEN)
    displayName: Deploy to Azure Static Web Apps
