# Builds and deploys apps/host to its Azure Static Web App, then runs the
# Playwright integration spec against the deployed URLs.
#
# Triggers only on changes that can affect the host bundle. Calendar and reports
# touching their own folders does NOT rebuild this app — that's the whole point
# of the independent-deploy demo.
#
# Required pipeline variables (set in Azure DevOps → Pipelines → this
# pipeline → Variables; mark *_TOKEN as "Keep this value secret"):
#   HOST_SWA_TOKEN                 (secret) deployment token from the Azure portal
#   PUBLIC_CALENDAR_REMOTE_URL     (plain)  e.g. https://witty-river-02c1eea10.7.azurestaticapps.net
#   PUBLIC_REPORTS_REMOTE_URL      (plain)  e.g. https://lively-flower-0bdc24110.7.azurestaticapps.net
#   PUBLIC_HOST_URL                (plain)  e.g. https://nice-flower-030343610.7.azurestaticapps.net
#                                           (Playwright runs against this after deploy.)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - apps/host/**
      - packages/contracts/**
      - packages/design-tokens/**
      - tests/integration/**
      - pipelines/azure-pipelines.host.yml
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - package.json

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '22.x'
  PNPM_VERSION: '11.1.3'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: $(NODE_VERSION)
    displayName: Install Node

  - script: npm install -g pnpm@$(PNPM_VERSION)
    displayName: Install pnpm

  - script: pnpm install --frozen-lockfile
    displayName: Install workspace dependencies

  - script: pnpm --filter host build
    displayName: Build host
    env:
      PUBLIC_CALENDAR_REMOTE_URL: $(PUBLIC_CALENDAR_REMOTE_URL)
      PUBLIC_REPORTS_REMOTE_URL: $(PUBLIC_REPORTS_REMOTE_URL)

  - task: AzureStaticWebApp@0
    inputs:
      app_location: 'apps/host/dist'
      skip_app_build: true
      skip_api_build: true
    env:
      azure_static_web_apps_api_token: $(HOST_SWA_TOKEN)
    displayName: Deploy to Azure Static Web Apps

  # Smoke test against the deployed host. Proves MF + Angular Elements compose
  # end-to-end on the real infrastructure, not just locally. Spec section 9:
  # "This is the test that proves MF actually works end-to-end."
  - script: pnpm --filter '@mf-demo/integration-tests' exec playwright install --with-deps chromium
    displayName: Install Playwright Chromium

  - script: pnpm --filter '@mf-demo/integration-tests' test
    displayName: Playwright smoke against deployed host
    env:
      PLAYWRIGHT_BASE_URL: $(PUBLIC_HOST_URL)
      CI: 'true'

  - task: PublishTestResults@2
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'tests/integration/results/junit.xml'
      failTaskOnFailedTests: true
      testRunTitle: 'Integration (deployed host)'
    displayName: Publish Playwright results
